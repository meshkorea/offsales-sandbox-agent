pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{cjs,cts,js,jsx,json,jsonc,mjs,mts,ts,tsx}"
      run: pnpm exec biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: rustfmt
      glob: "*.rs"
      run: rustfmt --edition 2021 {staged_files}
      stage_fixed: true
